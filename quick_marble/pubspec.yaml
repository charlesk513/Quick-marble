name: quick_marble_app
description: "Quick Marble & Granite — Business Management System"
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0

  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_storage: ^12.1.3
  cloud_functions: ^5.0.5

  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3
  connectivity_plus: ^6.0.5

  pdf: ^3.13.0
  printing: ^5.13.1

  intl: ^0.20.2
  fl_chart: ^0.68.0
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  flutter_svg: ^2.0.10
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.2
  file_picker: 10.3.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/logo.jpg
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: assets/images/logo.jpg
  min_sdk_android: 21

flutter_native_splash:
  color: "#000000"
  image: assets/images/logo.jpg
  android: true
  ios: true
  android_12:
    color: "#000000"
    image: assets/images/logo.jpg
